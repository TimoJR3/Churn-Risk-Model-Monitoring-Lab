services:
  api:
    build:
      context: .
    container_name: churn_lab_api
    env_file:
      - .env
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health', timeout=2)",
        ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s

  dashboard:
    build:
      context: .
    container_name: churn_lab_dashboard
    env_file:
      - .env
    command: >
      streamlit run dashboard/app.py
      --server.address 0.0.0.0
      --server.port 8501
    ports:
      - "8501:8501"
    depends_on:
      api:
        condition: service_healthy

  postgres:
    image: postgres:16
    container_name: churn_lab_postgres
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-churn_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-churn_password}
      POSTGRES_DB: ${POSTGRES_DB:-churn_lab}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./app/db/schema.sql:/docker-entrypoint-initdb.d/001_schema.sql:ro
      - ./app/db/seed_monitoring.sql:/docker-entrypoint-initdb.d/002_seed.sql:ro
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}",
        ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

volumes:
  postgres_data:
