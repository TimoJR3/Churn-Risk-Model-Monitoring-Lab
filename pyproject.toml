[tool.pytest.ini_options]
testpaths = ["tests"]
python_files = ["test_*.py"]
python_functions = ["test_*"]
addopts = "-q"

[tool.ruff]
target-version = "py311"
line-length = 88
exclude = [
    ".git",
    ".venv",
    "__pycache__",
    "artifacts",
    "data",
]

[tool.ruff.lint]
select = ["E", "F", "I", "UP", "B"]
ignore = []
